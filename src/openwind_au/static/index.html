<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenWind-AU</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header>
      <div>
        <h1>OpenWind-AU</h1>
        <p>Preliminary wind terrain and topographic analysis for Australian building sites.</p>
      </div>
    </header>

    <main>
      <section class="panel">
        <form id="analysis-form">
          <div class="grid">
            <label>
              Street address
              <input id="address" name="address" placeholder="1 Macquarie Street, Sydney NSW" />
            </label>
            <label>
              Latitude
              <input id="latitude" name="latitude" type="number" step="0.000001" />
            </label>
            <label>
              Longitude
              <input id="longitude" name="longitude" type="number" step="0.000001" />
            </label>
            <label>
              Building height (m)
              <input id="building_height_m" name="building_height_m" type="number" step="0.1" value="10" required />
            </label>
            <label>
              Radius (m)
              <input id="radius_m" name="radius_m" type="number" value="2000" />
            </label>
            <label>
              Radials
              <input id="radial_count" name="radial_count" type="number" value="36" />
            </label>
            <label>
              Sample interval (m)
              <input id="sample_interval_m" name="sample_interval_m" type="number" value="50" />
            </label>
          </div>
          <button type="submit">Run Analysis</button>
        </form>
        <p class="disclaimer">
          Preliminary analysis only. Results must be reviewed by a competent engineer and are not a certified AS/NZS 1170.2 assessment.
        </p>
      </section>

      <section class="panel">
        <h2>Summary</h2>
        <pre id="summary">Run an analysis to see results.</pre>
      </section>

      <section class="panel split">
        <div>
          <h2>Terrain Profiles</h2>
          <iframe id="profile-frame" title="Terrain profiles"></iframe>
        </div>
        <div>
          <h2>Map</h2>
          <iframe id="map-frame" title="Site map"></iframe>
        </div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
