name: Bug report
description: Report an incorrect result, failed data query, UI issue, or report problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        OpenWind-AU is an early-stage engineering support tool. Do not include private project,
        client, claim, policy, or property-owner information.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: inputs
    attributes:
      label: Inputs
      description: Address or coordinates, building height, radius, radials, and sample interval. Do not include confidential data.
      render: json
    validations:
      required: false
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: OS, Python version, browser
    validations:
      required: false
  - type: textarea
    id: safety
    attributes:
      label: Safety or wording concern
      description: Note any misleading compliance, certification, or design-value wording.
    validations:
      required: false
