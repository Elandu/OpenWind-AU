name: Bug report
description: Report an incorrect result, failed data query, UI issue, or report problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: inputs
    attributes:
      label: Inputs
      description: Address or coordinates, building height, radius, radials, and sample interval. Do not include confidential data.
      render: json
    validations:
      required: false
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: OS, Python version, browser
    validations:
      required: false
