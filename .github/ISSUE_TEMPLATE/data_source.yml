name: Data-source issue
description: Report or propose public geospatial dataset and service behaviour.
title: "[Data]: "
labels: ["data"]
body:
  - type: markdown
    attributes:
      value: |
        Use public datasets only. Do not include private project data or restricted licensed data
        unless you can explain the public usage rights.
  - type: input
    id: source
    attributes:
      label: Dataset or service
    validations:
      required: true
  - type: textarea
    id: coverage
    attributes:
      label: Coverage and resolution
    validations:
      required: true
  - type: textarea
    id: licence
    attributes:
      label: Licence or usage constraints
    validations:
      required: true
  - type: textarea
    id: integration
    attributes:
      label: Integration notes
    validations:
      required: false
  - type: textarea
    id: failure_mode
    attributes:
      label: Failure mode or limitation
      description: Describe timeouts, coverage gaps, datum concerns, licensing limits, or stale data.
    validations:
      required: false
