name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  frontend:
    name: Test browser state flows
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Check browser scripts
        run: |
          node --check src/openwind_au/static/app.js
          node --check src/openwind_au/static/validation.js
          node --check src/openwind_au/static/wind_workflow.js

      - name: Test browser state flows
        run: node --test tests/js/*.test.cjs

  lockfile:
    name: Verify dependency lock
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.28"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify lockfile matches project metadata
        run: uv lock --check

      - name: Audit locked dependencies
        run: uv audit --locked --preview-features audit-command

      - name: Install the locked development environment
        run: uv sync --locked --extra dev --python 3.12

      - name: Test the locked dependency graph
        run: uv run --locked --no-sync pytest

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Smoke-test console entry point
        run: openwind-au --help

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Pytest
        run: pytest

  package:
    name: Build consumer artifacts
    needs: [frontend, lockfile, test]
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Build wheel and source distribution
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Verify wheel contents and metadata
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          wheels = list(Path("dist").glob("openwind_au-*.whl"))
          assert len(wheels) == 1, wheels
          with ZipFile(wheels[0]) as archive:
              names = set(archive.namelist())
          required = {
              "openwind_au/data/shielding_multipliers.json",
              "openwind_au/data/terrain_height_multipliers.json",
              "openwind_au/errors.py",
              "openwind_au/main.py",
              "openwind_au/result_integrity.py",
              "openwind_au/standard_lookup_tables.py",
              "openwind_au/static/wind_workflow.js",
          }
          missing = required - names
          assert not missing, f"Wheel is missing required runtime files: {sorted(missing)}"
          PY

      - name: Smoke-test installed wheel
        run: |
          python -m pip install --no-deps --target /tmp/openwind-wheel-smoke dist/*.whl
          cd /tmp
          PYTHONPATH=/tmp/openwind-wheel-smoke python - <<'PY'
          from importlib.metadata import distribution, version

          from openwind_au import __version__
          from openwind_au.standard_lookup_tables import (
              MS_DATA_FILE,
              MZCAT_DATA_FILE,
              load_packaged_lookup_data,
          )

          assert version("openwind-au") == __version__
          console_scripts = {
              entry.name: entry.value
              for entry in distribution("openwind-au").entry_points
              if entry.group == "console_scripts"
          }
          assert console_scripts["openwind-au"] == "openwind_au.main:main"
          assert console_scripts["openwind-au-mcp"] == "openwind_au.mcp_server:main"
          for filename in (MZCAT_DATA_FILE, MS_DATA_FILE):
              assert load_packaged_lookup_data(filename)["schema_version"] == 1
          PY

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: openwind-au-distributions
          path: dist/*
