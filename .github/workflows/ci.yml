name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Pytest
        run: pytest

  package:
    name: Build consumer artifacts
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Build wheel and source distribution
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Verify wheel contents and metadata
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          wheels = list(Path("dist").glob("openwind_au-*.whl"))
          assert len(wheels) == 1, wheels
          with ZipFile(wheels[0]) as archive:
              names = set(archive.namelist())
          required = {
              "openwind_au/data/shielding_multipliers.json",
              "openwind_au/data/terrain_height_multipliers.json",
              "openwind_au/result_integrity.py",
              "openwind_au/standard_lookup_tables.py",
              "openwind_au/static/wind_workflow.js",
          }
          missing = required - names
          assert not missing, f"Wheel is missing required runtime files: {sorted(missing)}"
          PY

      - name: Smoke-test installed wheel
        run: |
          python -m pip install --no-deps --target /tmp/openwind-wheel-smoke dist/*.whl
          cd /tmp
          PYTHONPATH=/tmp/openwind-wheel-smoke python - <<'PY'
          from importlib.metadata import version

          from openwind_au import __version__
          from openwind_au.standard_lookup_tables import (
              MS_DATA_FILE,
              MZCAT_DATA_FILE,
              load_packaged_lookup_data,
          )

          assert version("openwind-au") == __version__
          for filename in (MZCAT_DATA_FILE, MS_DATA_FILE):
              assert load_packaged_lookup_data(filename)["schema_version"] == 1
          PY

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: openwind-au-distributions
          path: dist/*
